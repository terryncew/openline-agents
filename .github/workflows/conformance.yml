name: COLE Portable Core Conformance

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: python -m pip install -e .
      - run: python scripts/generate_vectors.py
      - run: python -m unittest discover -s tests -v
      - run: >-
          node verify-node.mjs
          vectors/input-receipt.json
          vectors/input-disclosure.json
          vectors/measurement-receipt.json
          vectors/previous-input-receipt.json
          vectors/previous-input-disclosure.json
      - run: >-
          node verify-node.mjs
          vectors/empty-input-receipt.json
          vectors/empty-input-disclosure.json
          vectors/empty-measurement-receipt.json
      - name: Reject tampered derived receipt
        run: |
          if node verify-node.mjs \
            vectors/input-receipt.json \
            vectors/input-disclosure.json \
            vectors/invalid-tampered-measurement.json \
            vectors/previous-input-receipt.json \
            vectors/previous-input-disclosure.json; then
            exit 1
          fi
